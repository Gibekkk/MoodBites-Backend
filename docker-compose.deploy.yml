services:
  app:
    image: moodbites-api:0.0.1
    pull_policy: never
    container_name: moodbites-app
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SERVER_PORT: 8080
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SERVER_IMAGE_HOST: ${SERVER_IMAGE_HOST}
      FIREBASE_CONFIG_NAME: ${FIREBASE_CONFIG_NAME}
    networks:
      - moodbites-network

networks:
  moodbites-network:
    external: true